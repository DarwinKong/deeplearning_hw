batch_size: 64
log_every: 10
n_games_eval: 50
n_games_train: 64
n_iter: 14000
n_optim_steps: 4  # PPO 常用多轮；一键脚本会传 --n-optim-steps 覆盖
n_steps_update: 32
seed: 42
enable_wandb: true  # 是否启用 Wandb 进行训练监控
wandb_project: 'dl-hw'  # Wandb 项目名称
wandb_run_name: 'ppo_run_test_wandb'  # Wandb 运行名称
# 勿设 wandb_entity（同上，避免 404 upsertBucket）
# PPO 算法参数
ppo:
  clip_epsilon: 0.2          # PPO Clip 范围
  value_loss_coef: 0.5       # Value Loss 系数
  entropy_coef: 0.01         # Entropy Bonus 系数
  max_grad_norm: 0.5         # 梯度裁剪范数
  
  # GAE (Generalized Advantage Estimation) 参数
  use_gae: true              # 是否启用 GAE（推荐开启）
  gae_lambda: 0.95           # GAE lambda 参数（0-1，越大偏差越小但方差越大）
  discount: 0.99             # Discount factor (gamma)
  normalize_advantages: true # 是否标准化优势函数（推荐开启，提升稳定性）
