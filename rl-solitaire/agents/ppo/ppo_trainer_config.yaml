# Proximal Policy Optimization (PPO) 训练配置
# ===========================================

# 批大小：每次优化使用的样本数量
batch_size: 64

# 日志频率：每多少个迭代记录一次评估结果
log_every: 10

# 评估游戏数量：每个迭代用于评估的游戏局数
n_games_eval: 50

# 训练游戏数量：每个迭代用于收集训练数据的游戏局数
n_games_train: 20

# 训练迭代次数：总共进行多少个训练迭代
# 建议值：
#   - 快速测试: 5-10
#   - 中等训练: 100-500
#   - 完整训练: 5000-15000
n_iter: 14000

# 每次更新的优化步数（null 表示使用默认行为）
n_optim_steps: null

# 每次更新的步数（null 表示使用默认行为）
n_steps_update: null

# 随机种子（null 表示使用默认种子 42）
seed: null
